---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: kubeslice-ui
  name: kubeslice-ui
  namespace: kubeslice-controller
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8080
  {{- if .Values.kubeslice.ui.labels }}
  selector:
    {{ toYaml .Values.kubeslice.ui.labels | nindent 8 }}
  {{- end }}
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeslice-ui
  namespace: kubeslice-controller
spec:
  replicas: 1
  selector:
    {{- if .Values.kubeslice.ui.labels }}
    matchLabels:
      {{ toYaml .Values.kubeslice.ui.labels | nindent 8 }}
    {{- end }}
  template:
    metadata:
      {{- if .Values.kubeslice.ui.labels }}
      labels: {{ toYaml .Values.kubeslice.ui.labels | nindent 8 }}
      {{- end }}
    spec:
      containers:
      - image: '{{ .Values.kubeslice.ui.imageRegistry }}/{{ .Values.kubeslice.ui.image }}:{{ .Values.kubeslice.ui.tag }}'
        imagePullPolicy: '{{ .Values.kubeslice.ui.pullPolicy }}'
        name: kubeslice-ui
        {{- if .Values.kubeslice.ui.securityContext }}
        securityContext: {{ toYaml .Values.kubeslice.ui.securityContext | nindent 12 }}
        {{- end }}
        env:
        - name: KUBESLICE_CONTROLLER_PROMETHEUS
          value: {{ .Values.kubeslice.prometheus.url }}
        - name: REACT_APP_SOCKET_URL
          value: 'ws://kubeslice-api-gw.kubeslice-controller.svc.cluster.local:3000'
        ports:
        - containerPort: 8080
      {{- if .Values.imagePullSecretsName }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretsName }}
      {{- end }}
      serviceAccountName: kubeslice-api-gw
      serviceAccount: kubeslice-api-gw
      {{- if .Values.kubeslice.ui.securityContext }}
      securityContext: {{ toYaml .Values.kubeslice.ui.securityContext | nindent 8 }}
      {{- end }}
      {{- if .Values.kubeslice.ui.tolerations }}
      tolerations: {{ toYaml .Values.kubeslice.ui.tolerations | nindent 8 }}
      {{- end }}