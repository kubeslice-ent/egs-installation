apiVersion: apps/v1
kind: Deployment
metadata:
  name: egs-queue-manager
  namespace: {{ .Release.Namespace }}
  labels:
    app: "queue-manager"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "queue-manager"
  template:
    metadata:
      labels:
        app: "queue-manager"
    spec:
      containers:
        - name: "queue-manager"
          {{- if .Values.egs.queueManager.securityContext }}
          securityContext: {{ toYaml .Values.egs.queueManager.securityContext | nindent 12 }}
          {{- end }}
          image: '{{ .Values.egs.queueManager.imageRegistry }}/{{ .Values.egs.queueManager.image }}:{{ .Values.egs.queueManager.tag }}'
          ports:
            - containerPort: 50051
              protocol: TCP
          {{- if .Values.egs.queueManager.resources }}
          resources: {{ toYaml .Values.egs.queueManager.resources | nindent 12 }}
          {{- end }}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: {{ .Values.egs.queueManager.imagePullPolicy }}
          env:
          - name: QMGR_CHECK_PERIOD
            value: "{{ .Values.egs.gprManager.qmgrCheckPeriod }}"
          - name: MAX_DELAYED_COUNT
            value: "{{ .Values.egs.gprManager.maxDelayedCount }}"
          - name: APP_ENV
            value: "{{ .Values.egs.queueManager.appEnv }}"
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: gpr-manager-access
      serviceAccount: gpr-manager-access
      {{- if .Values.egs.queueManager.securityContext }}
      securityContext: {{ toYaml .Values.egs.queueManager.securityContext | nindent 8 }}
      {{- end }}
      {{- if .Values.imagePullSecretsName }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretsName }}
      {{- end }}
      schedulerName: default-scheduler
      {{- if .Values.egs.queueManager.tolerations }}
      tolerations: {{ toYaml .Values.egs.queueManager.tolerations | nindent 8 }}
      {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.egs.queueManager.service.name }}
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.egs.queueManager.service.port }}
      targetPort: 50051
  selector:
    app: "queue-manager"
