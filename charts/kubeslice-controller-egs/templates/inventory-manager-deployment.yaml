apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    control-plane: inventory-controller-manager
  name: egs-inventory-controller-manager
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: inventory-controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: inventory-controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
          - /manager
        image: "{{ .Values.egs.inventory.imageRegistry }}/{{ .Values.egs.inventory.image }}:{{ .Values.egs.inventory.tag }}"
        imagePullPolicy: "{{ .Values.egs.inventory.pullPolicy }}"
        env:
          - name: LOG_LEVEL
            value: {{ .Values.egs.inventory.logLevel }}
          - name: DEV_MODE
            value: "false"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        {{- if Values.egs.inventory.resources }}
        resources: {{ toYaml Values.egs.inventory.resources | nindent 10 }}
        {{- end }}
        {{- if .Values.egs.inventory.securityContext }}
        securityContext: {{ toYaml .Values.egs.inventory.securityContext | nindent 10 }}
        {{- end }}
      {{- if .Values.egs.inventory.securityContext }}
      securityContext: {{ toYaml .Values.egs.inventory.securityContext | nindent 8 }}
      {{- end }}
      serviceAccountName: inventory-manager-access
      terminationGracePeriodSeconds: 10
      {{- if .Values.imagePullSecretsName }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretsName }}
      {{- end }}
      {{- if .Values.egs.inventory.tolerations }}
      tolerations: {{ toYaml .Values.egs.inventory.tolerations | nindent 8 }}
      {{- end }}
