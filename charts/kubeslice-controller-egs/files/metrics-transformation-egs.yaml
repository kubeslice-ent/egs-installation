# EGS normalized metrics: 1:1 mapping from DCGM and Jetson (jetson-stats exporter).
# Downstream (worker-operator, api-gw, UI) should query EGS_* with job=egs-metrics-ingestion.
metrics:
  # ---- DCGM → EGS (full mapping) ----
  - receiveName: "DCGM_FI_DEV_GPU_UTIL"
    publishName: "EGS_GPU_UTILIZATION"
    description: "NVIDIA GPU utilization percentage"
    type: "gauge"
    unitMultiplier: 1
    labelTransformer:
      - publishName: egs_job_name
        defaultValue: "egs-metrics-ingestion"
      - publishName: job
        defaultValue: "egs-metrics-ingestion"
      - publishName: egs_cluster_name
        receiveName: cluster_name
      - publishName: egs_gpu_id
        receiveName: gpu_id
      - publishName: egs_gpu_uuid
        receiveName: gpu_uuid
      - publishName: egs_device_id
        receiveName: device
      - publishName: egs_model_name
        receiveName: modelName
      - publishName: egs_hostname
        receiveName: hostname
      - publishName: egs_pod_name
        receiveName: pod
      - publishName: egs_namespace
        receiveName: namespace
      - publishName: egs_slice_name
        receiveName: slice_name
      - publishName: egs_instance
        receiveName: instance
      - publishName: egs_container
        receiveName: container

