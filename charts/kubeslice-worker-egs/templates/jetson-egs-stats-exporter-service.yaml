{{- if .Values.jetsonEgsStatsExporter.enabled }}
{{- $ns := .Values.jetsonEgsStatsExporter.namespace | default .Release.Namespace }}
{{- $name := "jetson-egs-stats-exporter" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    app: {{ $name }}
    component: monitoring
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.jetsonEgsStatsExporter.service.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    app: {{ $name }}
{{- end }}
